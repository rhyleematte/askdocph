# Final refined configuration for database support
providers = ["php", "node"]

[variables]
NIXPACKS_PHP_VERSION = '8.2'
# Focus strictly on missing extensions. Built-ins are removed to prevent conflicts.
NIXPACKS_PHP_EXTENSIONS = 'pdo_mysql, mbstring, bcmath, xml, curl, zip, gd, intl'

[phases.install]
cmds = ["composer install --no-dev --ignore-platform-reqs", "npm install"]

[phases.build]
cmds = ["npm run prod"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
