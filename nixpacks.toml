# Force PHP and Node providers
providers = ["php", "node"]

[variables]
NIXPACKS_PHP_VERSION = '8.2'
# Explicitly list every extension Laravel needs to talk to the database and process icons
NIXPACKS_PHP_EXTENSIONS = 'pdo_mysql, mbstring, bcmath, xml, curl, zip, dom, fileinfo, filter, gd, hash, iconv, openssl, pcre, pdo, session, tokenizer'

[phases.install]
cmds = ["composer install --no-dev --ignore-platform-reqs", "npm install"]

[phases.build]
cmds = ["npm run prod"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
